<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="game-container">
    <h1>Snake</h1>
    <p id="score">Score: 0</p>
    <canvas id="game"></canvas>

    <div class="controls">
      <button id="up" class="ctrl-btn up">▲</button>
      <div class="controls-row">
        <button id="left" class="ctrl-btn">◀</button>
        <button id="down" class="ctrl-btn">▼</button>
        <button id="right" class="ctrl-btn">▶</button>
      </div>
    </div>

    <button id="restart" class="restart-btn">Restart Game</button>
    <p id="game-over" class="hidden">Game Over!</p>
  </div>

  <script src="script.js"></script>
</body>
</html>
